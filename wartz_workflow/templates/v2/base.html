<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{% block title %}WARTZ Workflow{% endblock %}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#08090a;--panel:#0f1011;--surface:#191a1b;--surface-hover:#1f2022;--surface-active:#25262a;
  --text:#f7f8f8;--text-secondary:#d0d6e0;--text-muted:#8a8f98;--text-dim:#62666d;
  --accent:#5e6ad2;--accent-hover:#828fff;--accent-soft:rgba(94,106,210,.15);
  --border:rgba(255,255,255,.06);--border-strong:rgba(255,255,255,.10);
  --green:#22c55e;--green-soft:rgba(34,197,94,.12);--red:#ef4444;--red-soft:rgba(239,68,68,.12);
  --orange:#f59e0b;--orange-soft:rgba(245,158,11,.12);--blue:#3b82f6;
  --sidebar-width:240px;--header-height:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-feature-settings:"cv01","ss03"}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;line-height:1.5;font-size:14px;min-height:100vh;display:flex;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}

/* ── Sidebar (desktop fixed) ────────────────────────────────────────── */
.sidebar{
  width:var(--sidebar-width);background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;
  transition:transform .25s ease;
}
.sidebar-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-logo{font-size:15px;font-weight:600;letter-spacing:-0.2px;color:var(--text)}
.sidebar-logo span{color:var(--accent);font-weight:700}
.sidebar-logo a{color:inherit;text-decoration:none}
.sidebar-logo a:hover{color:inherit;text-decoration:none}
.sidebar-close{display:none;background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:0;width:32px;height:32px;align-items:center;justify-content:center}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.sidebar-section{padding:8px 20px;font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-top:8px}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:8px 20px;color:var(--text-muted);font-size:13px;font-weight:500;transition:all .12s;text-decoration:none;border-left:2px solid transparent}
.sidebar-link:hover{color:var(--text);background:var(--surface)}
.sidebar-link.active{color:var(--text);background:var(--surface-active);border-left-color:var(--accent)}
.sidebar-link .badge{margin-left:auto;font-size:11px;font-weight:600;padding:1px 6px;border-radius:4px;background:var(--accent-soft);color:var(--accent)}
.sidebar-footer{padding:12px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%}
.dot.green{background:var(--green)}.dot.yellow{background:var(--orange)}.dot.red{background:var(--red)}

/* ── Mobile sidebar (drawer overlay) ───────────────────────────────── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}

/* ── Main ──────────────────────────────────────────────────────────── */
.main{flex:1;margin-left:var(--sidebar-width);min-height:100vh;width:calc(100% - var(--sidebar-width))}
.header{height:var(--header-height);background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.header-title{font-size:15px;font-weight:600}
.header-actions{display:flex;gap:10px;align-items:center}
.btn{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;border:1px solid transparent;cursor:pointer;transition:all .12s;font-family:inherit;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--surface);color:var(--text-secondary);border-color:var(--border)}
.btn-secondary:hover{background:var(--surface-hover);color:var(--text)}
.burger{display:none;background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;padding:0;width:36px;height:36px;align-items:center;justify-content:center;margin-right:8px}
.container{width:100%;padding:24px}

/* ── Cards ─────────────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.card-title{font-size:14px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.06em}
.card-value{font-size:28px;font-weight:600;color:var(--text);letter-spacing:-0.4px}
.card-delta{font-size:12px;color:var(--text-muted);margin-top:4px}

/* ── KPI Grid ──────────────────────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.kpi-grid{grid-template-columns:1fr}}

/* ── Progress bar ──────────────────────────────────────────────────── */
.progress-bg{height:6px;background:var(--panel);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}

/* ── Tables (desktop) ──────────────────────────────────────────────── */
table{width:100%;border-collapse:collapse;font-size:13px;display:table}
th{text-align:left;padding:8px 12px;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border-strong);background:var(--panel)}
td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text-secondary);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}

/* Mobile cards (replace table on small screens) */
@media(max-width:640px){
  .table-card-list{display:flex;flex-direction:column;gap:10px}
  .table-card{display:none}  /* shown via template logic */
}

/* ── Form elements ─────────────────────────────────────────────────── */
input,textarea,select{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-family:inherit;font-size:13px;outline:none;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}

/* ── Toast ─────────────────────────────────────────────────────────── */
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:6px;font-size:13px;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.4);transform:translateY(80px);transition:transform .3s,opacity .3s,visibility .3s;z-index:200;max-width:90vw;word-break:break-word;opacity:0;visibility:hidden;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1;visibility:visible;pointer-events:auto}
.toast-success{background:var(--green-soft);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.toast-error{background:var(--red-soft);color:var(--red);border:1px solid rgba(239,68,68,.25)}
@media(max-width:480px){.toast{bottom:10px;right:10px;left:10px;max-width:none}}

/* ── Status badges ─────────────────────────────────────────────────── */
.status{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500}
.status-dot{width:6px;height:6px;border-radius:50%}
.status-done .status-dot{background:var(--green)}
.status-active .status-dot{background:var(--accent)}
.status-wait .status-dot{background:var(--text-dim)}
.status-block .status-dot{background:var(--red)}

/* ── Phase detail ──────────────────────────────────────────────────── */
.phase-detail-header{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px 24px;margin-bottom:16px}
.phase-detail-header h2{margin:0;font-size:20px;font-weight:500;word-break:break-word}
.phase-detail-header .meta{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;font-size:12px;color:var(--text-muted)}
.phase-detail-header .meta b{color:var(--text-secondary);font-weight:500}

/* ── Tabs ──────────────────────────────────────────────────────────── */
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .12s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── Editable rows ─────────────────────────────────────────────────── */
.row{display:grid;grid-template-columns:28px 1fr 120px 80px 32px;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);align-items:center}
@media(max-width:768px){.row{grid-template-columns:28px 1fr 100px 32px}}
@media(max-width:480px){.row{grid-template-columns:1fr 32px;gap:6px}.row .step-num{display:none}}
.row:last-child{border-bottom:none}
.step-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim)}
.row-actions{display:flex;gap:6px;justify-content:flex-end}
.icon-btn{width:28px;height:28px;border-radius:4px;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;font-size:15px}
.icon-btn:hover{background:var(--red-soft);color:var(--red);border-color:var(--red)}

/* ── Buttons group ─────────────────────────────────────────────────── */
.btn-group{display:flex;gap:10px;flex-wrap:wrap}

/* ── Responsive breakpoints ──────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.show{display:block}
  .sidebar-close{display:flex}
  .main{margin-left:0;width:100%}
  .burger{display:flex}
  .header{padding:0 16px}
  .container{padding:16px}
}
@media(max-width:480px){
  .container{padding:12px}
  .card{padding:14px}
  .card-value{font-size:22px}
  .header-title{font-size:14px}
}

/* ── Kanban ───────────────────────────────────────────────────────── */
{% block extra_style %}{% endblock %}
</style>
</head>
<body>

<!-- Sidebar overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo"><a href="/">wartz<span>workflow</span></a></div>
    <button class="sidebar-close" onclick="closeSidebar()">×</button>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-section">ОБЗОР</div>
    <a class="sidebar-link {% if page == 'dashboard' %}active{% endif %}" href="/">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Дашборд
    </a>
    <a class="sidebar-link {% if page == 'phases' %}active{% endif %}" href="/phases">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Фазы
    </a>
    <a class="sidebar-link {% if page == 'tasks' %}active{% endif %}" href="/tasks">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Задачи
    </a>
    <a class="sidebar-link {% if page == 'projects' %}active{% endif %}" href="/projects">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h18"/><path d="M5 7V5a2 2 0 0 1 2-2h3"/><path d="M19 7v12a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V7"/><path d="M9 12h6"/><path d="M9 16h4"/></svg>
      Проекты
    </a>
    <a class="sidebar-link {% if page == 'workflows' %}active{% endif %}" href="/workflows">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="6" rx="2"/><rect x="3" y="14" width="18" height="6" rx="2"/><path d="M7 10v4"/><path d="M17 10v4"/></svg>
      Воркфлоу
    </a>
    <div class="sidebar-section">УПРАВЛЕНИЕ</div>
    <a class="sidebar-link {% if page == 'agents' %}active{% endif %}" href="/agents">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4z"/><path d="M2 20c0-2.21 3.58-4 8-4s8 1.79 8 4"/></svg>
      Агенты
    </a>
    <a class="sidebar-link {% if page == 'settings' %}active{% endif %}" href="/settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Настройки
    </a>
    </nav>
    <div class="sidebar-footer">
    <span class="dot green"></span>
    {% if ui_port is defined %}<span>UI: {{ ui_port }}</span>{% else %}<span>UI: 8811</span>{% endif %}
    </div>
</aside>

<!-- Main -->
<main class="main">
  <header class="header">
    <div style="display:flex;align-items:center">
      <button class="burger" id="burgerBtn" onclick="openSidebar()">☰</button>
      <span class="header-title">{% block header_title %}{% endblock %}</span>
    </div>
    <div class="header-actions">
      {% block header_actions %}{% endblock %}
    </div>
  </header>

  <div class="container">
    {% block content %}{% endblock %}
  </div>
</main>

<div class="toast toast-success" id="toast" aria-hidden="true">Сохранено</div>

<script>
function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
  document.body.style.overflow='';
}
function showToast(msg, type){
  var t=document.getElementById('toast');
  if(t._hideTimer){clearTimeout(t._hideTimer);}
  t.textContent=msg;
  t.className='toast toast-'+type+' show';
  t.setAttribute('aria-hidden','false');
  t._hideTimer=setTimeout(function(){
    t.classList.remove('show');
    t.setAttribute('aria-hidden','true');
  },2000);
}
{% block extra_script %}{% endblock %}
</script>
</body>
</html>
