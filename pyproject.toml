[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wartz-workflow"
version = "1.0.0"
description = "WARTZ Workflow CLI — жёсткий пофазовый клиент"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "click>=8.0",
    "rich>=13.0",
    "requests>=2.28",
    "pyyaml>=6.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=4.0", "ruff>=0.3", "mypy>=1.7"]
ui  = ["fastapi>=0.100", "uvicorn[standard]>=0.23", "jinja2>=3.1"]

[project.scripts]
wartz-workflow = "wartz_workflow.cli:main"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_ignores = true